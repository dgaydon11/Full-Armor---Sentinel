<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Armor - Sentinel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #050508;
            --card-bg: rgba(10, 10, 18, 0.7);
            --accent-cyan: #00f0ff;
            --accent-purple: #bd00ff;
            --accent-green: #39ff14;
            --text-main: #f0f3f8;
            --text-muted: #8a99ad;
            --border-color: rgba(0, 240, 255, 0.15);
            --border-glow: rgba(0, 240, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(189, 0, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 240, 255, 0.1) 0px, transparent 50%),
                radial-gradient(circle at center, rgba(5, 5, 8, 0.8) 0%, #050508 100%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Ambient background grid */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        /* Scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 10;
            pointer-events: none;
            opacity: 0.45;
        }

        /* Outer Container */
        .sentinel-container {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(0, 240, 255, 0.05);
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }

        .sentinel-container:hover {
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.6),
                0 0 50px rgba(0, 240, 255, 0.1);
        }

        /* Header design */
        .sentinel-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .sentinel-logo {
            font-size: 3.5rem;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff 30%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .sentinel-tagline {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.85;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 1.8s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                opacity: 0.6;
                box-shadow: 0 0 4px var(--accent-green);
            }

            100% {
                transform: scale(1.2);
                opacity: 1;
                box-shadow: 0 0 12px var(--accent-green);
            }
        }

        /* Dashboard Grid layout */
        .system-status {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .status-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(0, 240, 255, 0.2);
            transform: translateY(-2px);
        }

        .card-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title i {
            color: var(--accent-cyan);
        }

        .card-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
        }

        .card-value.highlight {
            color: var(--accent-cyan);
            font-family: 'Share Tech Mono', monospace;
        }

        /* Interface controls */
        .sentinel-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            padding: 14px 35px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan) 0%, #00b0ff 100%);
            color: #050508;
            border: none;
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 240, 255, 0.5);
            background: linear-gradient(135deg, #33f5ff 0%, #33c4ff 100%);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-cyan);
            transform: translateY(-2px);
        }

        /* Bottom Deploy Widget - Styled aligned with HQ but refined */
        #deploy-timestamp-widget {
            position: fixed;
            bottom: 15px;
            left: 15px;
            background: rgba(15, 15, 15, 0.95);
            color: var(--accent-cyan);
            padding: 8px 14px;
            border-radius: 4px;
            font-family: 'Share Tech Mono', Courier, monospace;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid var(--accent-cyan);
            z-index: 999999;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.7);
            pointer-events: none;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>

<body>
    <div class="grid-overlay"></div>
    <div class="scanlines"></div>

    <div class="sentinel-container">
        <div class="sentinel-header">
            <h1 class="sentinel-logo">Full Armor Sentinel</h1>
            <div class="sentinel-tagline">
                <span class="status-dot"></span>
                Node Active // Security Operations
            </div>
        </div>

        <div class="system-status">
            <div class="status-card">
                <div class="card-title">
                    <i class="fa-solid fa-shield-halved"></i>
                    Firewall Mode
                </div>
                <div class="card-value highlight">ENFORCED</div>
            </div>

            <div class="status-card">
                <div class="card-title">
                    <i class="fa-solid fa-circle-nodes"></i>
                    Network Uplink
                </div>
                <div class="card-value">SECURE</div>
            </div>

            <div class="status-card">
                <div class="card-title">
                    <i class="fa-solid fa-gauge-high"></i>
                    Scan Frequency
                </div>
                <div class="card-value highlight">460.67 MHz</div>
            </div>
        </div>

        <div class="sentinel-actions">
            <a href="sentinel_interior.html" class="btn btn-primary">
                <i class="fa-solid fa-door-open"></i>
                Enter Interior
            </a>
            <a href="#" class="btn btn-secondary" onclick="alert('Access Console Initialized')">
                <i class="fa-solid fa-terminal"></i>
                Access Console
            </a>
            <a href="https://console.firebase.google.com/project/full-armor-sentinel/overview" target="_blank"
                class="btn btn-secondary">
                <i class="fa-solid fa-cloud"></i>
                Firebase Console
            </a>
        </div>
    </div>

    <div id="deploy-timestamp-widget">
        <i class="fa-solid fa-clock-rotate-left"></i>
        SENTINEL DEPLOY TIME: <span id="revision-time">INITIALIZING...</span>
    </div>

    <script>
        (function () {
            var lastMod = new Date(document.lastModified);
            var formattedDate = lastMod.toLocaleDateString() + " @ " + lastMod.toLocaleTimeString();
            document.getElementById("revision-time").textContent = formattedDate;
        })();
    </script>
</body>

</html>
